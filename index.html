<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thiệp cưới Phong & Thư</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: #fdf6f0;
        }

        .hero {
            position: relative;
            height: 100vh;
            background: url('a3.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .overlay {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            font-size: 50px;
            margin: 10px 0;
        }

        .section {
            padding: 60px 20px;
        }

        .gallery img {
            width: 300px;
            border-radius: 15px;
            margin: 10px;
        }

        .countdown {
            font-size: 30px;
            color: #b76e79;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            background: #b76e79;
            color: white;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- ẢNH BÌA -->
<div class="hero">
    <div class="overlay">
        <h2>Save The Date</h2>
        <h1>Phong & Thư</h1>
        <p>28.12.2025</p>
    </div>
</div>

<!-- GIỚI THIỆU -->
<div class="section">
    <h2>Chúng tôi kết hôn 💖</h2>
    <p>Trân trọng kính mời bạn đến chung vui cùng gia đình chúng tôi</p>
</div>

<!-- ẢNH CẶP ĐÔI -->
<div class="section gallery">
    <h2>Album của chúng tôi</h2>
    <img src="a3.jpg">
    <img src="a4.jpg">
</div>

<!-- THÔNG TIN -->
<div class="section">
    <h2>Thông tin lễ cưới</h2>
    <p>📍 Nhà hàng ABC</p>
    <p>🕒 18:00 - 28/12/2025</p>

    <div class="countdown" id="countdown"></div>

   <div style="margin-top:20px;">
    <h3>📍 Địa điểm</h3>

    <p><b>🏠 Nhà trai</b></p>
    <a href="https://maps.google.com/?q=dia-chi-nha-trai" target="_blank" class="btn">
        Xem bản đồ Nhà trai
    </a>

    <p style="margin-top:20px;"><b>🏠 Nhà gái</b></p>
    <a href="https://maps.google.com/?q=dia-chi-nha-gai" target="_blank" class="btn">
        Xem bản đồ Nhà gái
    </a>
</div>
</div>

<script>
    const targetDate = new Date("Dec 28, 2025 18:00:00").getTime();

    setInterval(() => {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        document.getElementById("countdown").innerHTML =
            "Còn " + days + " ngày nữa 💕";
    }, 1000);
</script>

</body>
</html>
